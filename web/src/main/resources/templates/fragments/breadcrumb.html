<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head><title>Fragment</title></head>
<body>
<div th:fragment="backButton(href, label)" class="mb-3">
    <a class="btn btn-link p-0 text-decoration-none d-inline-flex align-items-center gap-1"
       th:href="${href}">
        <i class="bi bi-arrow-left" aria-hidden="true"></i>
        <span th:text="${label}">Tillbaka</span>
    </a>
</div>
</body>
</html>
