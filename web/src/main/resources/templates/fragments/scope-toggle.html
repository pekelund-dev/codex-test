<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head><title>Fragment</title></head>
<body>
<div th:fragment="scopeToggle(canViewAll, scopeParam, viewingAll, myUrl, allUrl, descriptionAll, descriptionMy)"
     th:if="${canViewAll}" class="mb-3">
    <div class="btn-group btn-group-sm" role="group" aria-label="Kvittoomfång">
        <a class="btn btn-outline-primary" th:classappend="${scopeParam == 'my'} ? ' active'"
           th:href="${myUrl}">Mina kvitton</a>
        <a class="btn btn-outline-primary" th:classappend="${scopeParam == 'all'} ? ' active'"
           th:href="${allUrl}">Alla kvitton</a>
    </div>
    <p class="text-muted small mb-0 mt-2"
       th:text="${viewingAll} ? ${descriptionAll} : ${descriptionMy}">Visar dina kvitton.</p>
</div>
</body>
</html>
