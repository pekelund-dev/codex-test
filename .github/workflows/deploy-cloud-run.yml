name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - test
          - staging
      branch:
        description: 'Branch or tag to deploy (defaults to the branch the workflow runs from)'
        required: false
        default: ''
        type: string
      region:
        description: 'GCP region'
        required: false
        default: 'us-east1'
        type: string

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ inputs.region || 'us-east1' }}
  # Environment-specific service names
  WEB_SERVICE_NAME: ${{ inputs.environment == 'test' && 'pklnd-web-test' || 'pklnd-web' }}
  RECEIPT_SERVICE_NAME: ${{ inputs.environment == 'test' && 'pklnd-receipts-test' || 'pklnd-receipts' }}

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Capture git info
        id: git_info
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate build metadata
        id: meta
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA=${{ steps.git_info.outputs.short_sha }}
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "web_image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/web/pklnd-web:${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "receipt_image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/receipts/pklnd-receipts:${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/web/pklnd-web:latest
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/web/pklnd-web:${{ steps.meta.outputs.short_sha }}
          cache-from: |
            type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/web/pklnd-web:latest
            type=gha,scope=build-web-${{ inputs.branch || github.ref_name }}
          cache-to: type=gha,mode=max,scope=build-web-${{ inputs.branch || github.ref_name }}
          build-args: |
            GIT_BRANCH=${{ steps.git_info.outputs.branch }}
            GIT_COMMIT=${{ steps.git_info.outputs.sha }}

      - name: Build and push receipt-parser image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./receipt-parser/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.receipt_image }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/receipts/pklnd-receipts:latest
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/receipts/pklnd-receipts:${{ steps.meta.outputs.short_sha }}
          cache-from: |
            type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/receipts/pklnd-receipts:latest
            type=gha,scope=build-receipts-${{ inputs.branch || github.ref_name }}
          cache-to: type=gha,mode=max,scope=build-receipts-${{ inputs.branch || github.ref_name }}
          build-args: |
            GIT_BRANCH=${{ steps.git_info.outputs.branch }}
            GIT_COMMIT=${{ steps.git_info.outputs.sha }}

      - name: Deploy web service to Cloud Run
        run: |
          set -e
          echo "Deploying web service with image: ${{ steps.meta.outputs.web_image }}"
          echo "Service name: ${{ env.WEB_SERVICE_NAME }}"
          # Only update the image - all other settings (service account, memory, CPU, etc.)
          # are preserved from the existing service configuration
          gcloud run deploy ${{ env.WEB_SERVICE_NAME }} \
            --image=${{ steps.meta.outputs.web_image }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed

      - name: Deploy receipt-parser service to Cloud Run
        run: |
          set -e
          echo "Deploying receipt-parser service with image: ${{ steps.meta.outputs.receipt_image }}"
          echo "Service name: ${{ env.RECEIPT_SERVICE_NAME }}"
          # Only update the image - all other settings (service account, memory, CPU, etc.)
          # are preserved from the existing service configuration
          gcloud run deploy ${{ env.RECEIPT_SERVICE_NAME }} \
            --image=${{ steps.meta.outputs.receipt_image }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed

      - name: Get Cloud Run URLs
        id: urls
        run: |
          WEB_URL=$(gcloud run services describe ${{ env.WEB_SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          RECEIPT_URL=$(gcloud run services describe ${{ env.RECEIPT_SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)' 2>/dev/null || echo "Not deployed")
          echo "web_url=${WEB_URL}" >> $GITHUB_OUTPUT
          echo "receipt_url=${RECEIPT_URL}" >> $GITHUB_OUTPUT

      - name: Smoke tests
        run: |
          WEB_URL="${{ steps.urls.outputs.web_url }}"
          RECEIPT_URL="${{ steps.urls.outputs.receipt_url }}"

          echo "## Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Web service health check
          if [ "$WEB_URL" != "Not deployed" ]; then
            echo "Checking web service health: ${WEB_URL}/actuator/health"
            HTTP_STATUS=$(curl --silent --max-time 30 --retry 3 --retry-delay 5 \
              --output /dev/null --write-out "%{http_code}" "${WEB_URL}/actuator/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "| Web health (/actuator/health) | ✅ $HTTP_STATUS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Web health (/actuator/health) | ❌ $HTTP_STATUS |" >> $GITHUB_STEP_SUMMARY
              echo "::error::Web service health check failed with HTTP $HTTP_STATUS"
              exit 1
            fi

            # Verify login page renders
            echo "Checking web login page: ${WEB_URL}/login"
            HTTP_STATUS=$(curl --silent --max-time 30 --retry 3 --retry-delay 5 \
              --output /dev/null --write-out "%{http_code}" "${WEB_URL}/login" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "| Web login page (/login) | ✅ $HTTP_STATUS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Web login page (/login) | ❌ $HTTP_STATUS |" >> $GITHUB_STEP_SUMMARY
              echo "::error::Web login page check failed with HTTP $HTTP_STATUS"
              exit 1
            fi
          else
            echo "| Web service | ⚠️ Not deployed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Receipt parser - internal service with Cloud Run IAM auth.
          # Verify deployment via Cloud Run service status (avoids HTTP auth requirement).
          if [ "$RECEIPT_URL" != "Not deployed" ]; then
            echo "Checking receipt-parser Cloud Run service status"
            READY=$(gcloud run services describe ${{ env.RECEIPT_SERVICE_NAME }} \
              --region=${{ env.REGION }} \
              --format='value(status.conditions[0].status)' 2>/dev/null || echo "Unknown")
            if [ "$READY" = "True" ]; then
              echo "| Receipt-parser service (Cloud Run ready) | ✅ Ready |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Receipt-parser service (Cloud Run ready) | ❌ $READY |" >> $GITHUB_STEP_SUMMARY
              echo "::error::Receipt-parser service is not ready: status=$READY"
              exit 1
            fi
          else
            echo "| Receipt-parser service | ⚠️ Not deployed |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Deployment Summary
        run: |
          echo "## Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Project:** ${{ env.PROJECT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Services" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Web | ${{ steps.urls.outputs.web_url }} | \`${{ steps.meta.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Receipt Parser | ${{ steps.urls.outputs.receipt_url }} | \`${{ steps.meta.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ steps.git_info.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ steps.git_info.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** ${{ steps.meta.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup old images
        if: always()
        continue-on-error: true
        run: |
          # Clean up old images (keep last 3 timestamped versions)
          PROJECT_ID=${{ env.PROJECT_ID }} ./scripts/terraform/cleanup_artifacts.sh || true
